<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <form>
        <label for="user"  >Name :</label>
        <input type="text" id="user" placeholder="Enter name">
        <br>
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Enter your email">
        <br>
        <label for="password">Password</label>
        <input type="password" id="password" >
        <br>
        <label for="subject">Subject :</label>
        <select id="subject">
            <option value="">Choose Subject</option>
            <option value="Maths">Maths</option>
            <option value="Science">Science</option>
            <option value="Gujarati">Gujarati</option>
            <option value="Hindi">Hindi</option>
        </select>
        <br>

        <label for="class">Class</label>
        <input type="text" name="" id="class" list="class-option">
        <datalist id="class-option">
            <option value="11th">11th</option>
            <option value="12th">12th</option>
        </datalist>
        <br>

        <label for="file">File</label>
        <input type="file" name="file" id="file" accept=".png , .jpg , .pdf">
        <br>

        <label for="phone">PhoneNumber</label>
        <input type="tel" name="phone" id="phonr" placeholder="Enter Your Number">
        <br>

        <label for="age">Age</label>
        <input type="number" name="age" id="age" placeholder="Enter Your Age">
        <br>

        <label for="address">Address</label>
        <textarea name="address" id="address" placeholder="Address" cols="30" rows=""></textarea>
        <br>
        <button>Submit</button>
    </form>
</body>
</html>
